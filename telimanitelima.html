<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TILIMANITELIMA</title>

<!-- Tailwind CSS pour le design -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">

<!-- Leaflet CSS & JS pour la carte -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Icône de moto pour chauffeurs -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
  #map { height: 400px; border-radius:10px; margin: 20px auto; max-width: 90%; }
  .marker-driver { width: 30px; }
</style>
</head>
<body class="bg-gray-100 font-sans">

<!-- Header -->
<header class="text-center p-6 bg-white shadow-md">
  <h1 class="text-3xl font-bold text-blue-600">TILIMANITELIMA</h1>
  <p class="text-gray-500 mt-2">Réservez une moto taxi à Bamako</p>
</header>

<!-- Carte -->
<div id="map"></div>

<!-- Formulaire -->
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 mt-4">
  <h2 class="text-xl font-bold mb-4">Demander une moto</h2>

  <input placeholder="Nom" id="name" class="border p-2 w-full mb-2 rounded">
  <input placeholder="Téléphone" id="phone" class="border p-2 w-full mb-2 rounded">
  <input placeholder="Lieu de départ" id="departure" class="border p-2 w-full mb-2 rounded">
  <input placeholder="Destination" id="destination" class="border p-2 w-full mb-2 rounded">
  
  <button id="orderBtn" class="bg-blue-600 text-white py-2 px-4 rounded w-full hover:bg-blue-700 mt-2">
    Commander
  </button>
</div>

<script>
  // Initialisation de la carte
  var map = L.map('map').setView([12.6392, -8.0029], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

  // Icône chauffeurs
  var driverIcon = L.icon({
    iconUrl: 'https://img.icons8.com/emoji/48/motorcycle-emoji.png',
    iconSize: [30, 30]
  });

  // Fonction pour afficher les chauffeurs proches
  function spawnDrivers(lat, lon, count = 5) {
    for(let i = 0; i < count; i++){
      const offsetLat = (Math.random() - 0.5) / 100;
      const offsetLon = (Math.random() - 0.5) / 100;
      L.marker([lat + offsetLat, lon + offsetLon], {icon: driverIcon})
        .addTo(map)
        .bindPopup("Chauffeur proche");
    }
  }

  // Récupérer la position de l'utilisateur
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      L.marker([lat, lon]).addTo(map).bindPopup("Vous êtes ici").openPopup();
      map.setView([lat, lon], 15);

      // Ajouter chauffeurs proches
      spawnDrivers(lat, lon, 8);
    });
  } else {
    alert("Géolocalisation non supportée par ce navigateur.");
  }

  // Réservation automatique
  document.getElementById("orderBtn").addEventListener("click", function() {
    const nom = document.getElementById("name").value;
    const tel = document.getElementById("phone").value;
    const depart = document.getElementById("departure").value;
    const destination = document.getElementById("destination").value;

    if (!nom || !tel || !depart || !destination) {
      alert("Veuillez remplir tous les champs !");
      return;
    }

    alert(`Commande reçue !\nNom: ${nom}\nTéléphone: ${tel}\nDépart: ${depart}\nDestination: ${destination}\nUn chauffeur proche va vous contacter.`);
  });
</script>
</body>
</html>
